# Pins the default package index for `uv pip install` commands run in
# this project to PyTorch's CUDA 12.8 wheel index, with PyPI as a
# fallback for everything else.
#
# Without this, installing ANY package that depends on torch (spandrel,
# a future package, etc.) resolves torch from plain PyPI — which has no
# CUDA build under that name and silently replaces the pinned
# torch==2.7.0+cu128 with a CPU-only build. That happened for real:
# `uv pip install spandrel` swapped torch 2.7.0+cu128 -> 2.12.1 (CPU)
# because no index preference was configured.
#
# torch is still deliberately excluded from requirements.txt (see the
# comment there) — this file is what makes any OTHER uv pip install in
# this project safe to run without re-breaking that pin.
#
# IMPORTANT — two gotchas for any manual `torch==X.Y.Z` install/reinstall:
#
# 1. PEP 440 ignores local version tags in a bare ==X.Y.Z match, so
#    "torch==2.7.0" matches BOTH this index's 2.7.0+cu128 build AND any
#    plain-PyPI 2.7.0 (CPU) build. Always pin the FULL build tag:
#    torch==2.7.0+cu128, torchvision==0.22.0+cu128, etc.
#
# 2. Even with the exact build tag pinned, uv's default index-strategy
#    ("first-index") commits to whichever configured index it decides
#    has torch FIRST — which can be the pypi extra-index-url above, not
#    this file's cu128 index-url, regardless of what --index-url you
#    pass on the command line. If uv refuses with "no version of
#    torch==X.Y.Z+cu128" even though that exact version obviously
#    exists, add `--index-strategy unsafe-best-match` to the command.
#    This is safe ONLY because the build tag is pinned exactly (rule 1)
#    — there's no ambiguity for a same-named PyPI package to exploit.
#
# See install/bootstrap.bat|sh for the reference invocation.
[pip]
index-url = "https://download.pytorch.org/whl/cu128"
extra-index-url = ["https://pypi.org/simple"]
