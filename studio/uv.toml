# Pins the default package index for `uv pip install` commands run in
# this project to PyTorch's CUDA 12.8 wheel index, with PyPI as a
# fallback for everything else.
#
# Without this, installing ANY package that depends on torch (spandrel,
# a future package, etc.) resolves torch from plain PyPI — which has no
# CUDA build under that name and silently replaces the pinned
# torch==2.7.0+cu128 with a CPU-only build. That happened for real:
# `uv pip install spandrel` swapped torch 2.7.0+cu128 -> 2.12.1 (CPU)
# because no index preference was configured.
#
# torch is still deliberately excluded from requirements.txt (see the
# comment there) — this file is what makes any OTHER uv pip install in
# this project safe to run without re-breaking that pin.
#
# IMPORTANT: this index alone is not sufficient protection for manual
# `torch==X.Y.Z` installs/reinstalls. PEP 440 ignores local version tags
# in a bare ==X.Y.Z match, so "torch==2.7.0" matches BOTH this index's
# 2.7.0+cu128 build AND any plain-PyPI 2.7.0 (CPU) build — uv can pick
# whichever it resolves/caches first, defeating the index-url above.
# Always pin the FULL build tag explicitly: torch==2.7.0+cu128,
# torchvision==0.22.0+cu128, etc. See install/bootstrap.bat|sh.
[pip]
index-url = "https://download.pytorch.org/whl/cu128"
extra-index-url = ["https://pypi.org/simple"]
